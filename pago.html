<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Abarrotes Almiux — Pago</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@700;900&family=DM+Sans:wght@400;500&display=swap"
    rel="stylesheet">

  <!-- Hoja de estilos principal -->
  <link rel="stylesheet" href="styles.css">

  <!-- Iconos -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>

<body>

  <!-- Header dinámico -->
  <div id="navbar-container"></div>

  <!-- Sección de Pago -->
  <section class="pago">
    <h1>Finalizar compra</h1>
    <p>Completa tus datos para procesar el pago de manera segura.</p>

    <form id="pago-form" class="pago-form">
      <!-- Datos personales -->
      <div class="form-group">
        <label for="nombre">Nombre completo</label>
        <input type="text" id="nombre" name="nombre" required>
      </div>

      <div class="form-group">
        <label for="correo">Correo electrónico</label>
        <input type="email" id="correo" name="correo" required>
      </div>

      <div class="form-group">
        <label for="direccion">Dirección de entrega</label>
        <input type="text" id="direccion" name="direccion" required>
      </div>

      <!-- Datos de tarjeta -->
      <div class="form-group">
        <label for="tarjeta">Número de tarjeta</label>
        <input type="text" id="tarjeta" name="tarjeta" maxlength="16" required>
      </div>

      <div class="form-group">
        <label for="exp">Fecha de expiración (MM/AA)</label>
        <input type="text" id="exp" name="exp" placeholder="MM/AA" required>
      </div>

      <div class="form-group">
        <label for="cvv">CVV</label>
        <input type="text" id="cvv" name="cvv" maxlength="3" required>
      </div>

      <button type="submit" class="btn-primary">Pagar ahora</button>
    </form>
  </section>

  <!-- Footer dinámico -->
  <div id="footer-container"></div>

  <!-- Scripts -->
  <script src="js/utils.js"></script>
  <script src="js/navbar.js"></script>
  <script src="js/footer.js"></script>
  <script src="js/productos.js"></script>
  <script src="js/main.js"></script>
  <script src="js/carrito.js"></script>

  <!-- Validación básica -->
  <script>
    document.getElementById("pago-form").addEventListener("submit", function (e) {
      e.preventDefault();

      const nombre = document.getElementById("nombre").value.trim();
      const correo = document.getElementById("correo").value.trim();
      const direccion = document.getElementById("direccion").value.trim();
      const tarjeta = document.getElementById("tarjeta").value.trim();
      const exp = document.getElementById("exp").value.trim();
      const cvv = document.getElementById("cvv").value.trim();

      // Validaciones
      if (nombre.length < 3) {
        alert("El nombre debe tener al menos 3 caracteres.");
        return;
      }

      if (!/^[^@]+@[^@]+\.[a-zA-Z]{2,}$/.test(correo)) {
        alert("Ingresa un correo electrónico válido.");
        return;
      }

      if (direccion.length < 5) {
        alert("La dirección debe ser más detallada.");
        return;
      }

      if (!/^\d{16}$/.test(tarjeta)) {
        alert("El número de tarjeta debe tener 16 dígitos.");
        return;
      }

      if (!/^(0[1-9]|1[0-2])\/\d{2}$/.test(exp)) {
        alert("La fecha de expiración debe estar en formato MM/AA.");
        return;
      }

      if (!/^\d{3}$/.test(cvv)) {
        alert("El CVV debe tener 3 dígitos.");
        return;
      }

      alert("Pago procesado correctamente. ¡Gracias por tu compra!");
    });
  </script>
</body>
</html>
